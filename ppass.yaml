esphome:
  name: ppass
  friendly_name: ppass

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret hass_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "PPASS Fallback Hotspot"
    password: !secret fallback_wifi_password

captive_portal:
  
web_server:
  port: 80


light:
  - platform: neopixelbus
    type: GRB
    variant: WS2811
    pin: GPIO8
    num_leds: 60
    name: "NeoPixel Light"
    

binary_sensor:
  - name: "Light relay"
    platform: gpio
    pin:
      number: GPIO0
      inverted: True
      mode:
        input: True
        pullup: True
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - name: "Override Switch"
    platform: gpio
    pin:
      number: GPIO18
      inverted: True
      mode:
        input: True
        pullup: True
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - name: "Forced State"
    platform: gpio
    pin:
      number: GPIO2
      inverted: True
      mode:
        input: True
        pullup: True
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms



switch:
  - name: "Closed LED"
    platform: gpio
    pin: GPIO1

  - name: "Open LED"
    platform: gpio
    pin: GPIO3

  - name: "Disabled LED"
    platform: gpio
    pin: GPIO10

  - name: "Enabled LED"
    platform: gpio
    pin: GPIO19

  - name: "Stack Beep"
    platform: gpio
    pin: GPIO4

  - name: "Stack Red"
    platform: gpio
    pin: GPIO5

  - name: "Stack Yellow"
    inverted: true
    platform: gpio
    pin: GPIO6

  - name: "Stack Green"
    platform: gpio
    pin: GPIO7


